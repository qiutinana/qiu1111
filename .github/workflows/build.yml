name: Build Vue Project

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 16
        uses: actions/setup-node@v4
        with:
          node-version: 16
      - name: Install dependencies and replace node-sass
        run: |
          npm install --legacy-peer-deps
          npm uninstall node-sass
          npm install sass --save-dev
      - name: Build with verbose output
        run: |
          NODE_OPTIONS="--max_old_space_size=4096" npm run build --verbose
      - name: List files after build
        run: |
          echo "=== Current directory ==="
          ls -la
          echo "=== Looking for dist/app directories ==="
          find . -type d \( -name "dist" -o -name "app" \) -print
          echo "=== Looking for built files in src/ ==="
          find src -type f -name "*.js" -o -name "*.css" | head -10
      - name: Upload artifact (if app exists)
        uses: actions/upload-artifact@v4
        with:
          name: app-folder
          path: app
          if-no-files-found: warn
