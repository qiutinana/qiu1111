name: Build Vue Project

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 16
        uses: actions/setup-node@v4
        with:
          node-version: 16
      - name: Install dependencies and replace node-sass
        run: |
          npm install --legacy-peer-deps
          npm uninstall node-sass
          npm install sass --save-dev
      - name: Build with explicit output directory
        run: |
          # 强制输出到 dist 目录
          NODE_OPTIONS="--max_old_space_size=4096" npx vue-cli-service build --dest dist
      - name: Verify dist directory exists
        run: |
          if [ -d "dist" ]; then
            echo "✅ dist directory found"
            ls -la dist
          else
            echo "❌ dist directory not found"
            # 尝试查找任何可能存在的构建输出
            find . -type d -name "dist" -o -name "app" -o -name "build" | head -10
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-folder
          path: dist
